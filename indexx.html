<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        /* LIGHT MODE */
        body.light {
            background: #f4f4f4;
            color: #333;
        }

        /* DARK MODE */
        body.dark {
            background: #121212;
            color: #f4f4f4;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        section {
            padding: 30px;
            margin: 20px;
            border-radius: 10px;
        }

        body.light section {
            background: white;
        }

        body.dark section {
            background: #1e1e1e;
        }

        a {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
        }

        body.light a {
            background: #007BFF;
            color: white;
        }

        body.dark a {
            background: #00c3ff;
            color: black;
        }

        img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            display: block;
            margin: auto;
        }

        video {
            display: block;
            margin: 20px auto;
            border-radius: 10px;
        }

        /* TOGGLE BUTTON */
        .toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        body.light .toggle-btn {
            background: black;
            color: white;
        }

        body.dark .toggle-btn {
            background: white;
            color: black;
        }
    </style>
</head>

<body class="light">

<button class="toggle-btn" onclick="toggleMode()">🌙 Dark Mode</button>

<header>
    <h1>🌐 My Creative Webpage</h1>
    <p>Now with Dark Mode 😎</p>
</header>

<section>
    <h2>🔗 Visit Google</h2>
    <a href="https://www.google.com" target="_blank">Go to Google</a>
</section>

<section>
    <h2>🖼️ Image</h2>
    <img src="https://www.w3schools.com/html/pic_trulli.jpg" alt="Trulli">
</section>

<section>
    <h2>🎬 Video</h2>
    <video width="400" controls>
        <source src="movie.mp4" type="video/mp4">
    </video>
</section>

<script>
    function toggleMode() {
        const body = document.body;
        const btn = document.querySelector(".toggle-btn");

        body.classList.toggle("dark");
        body.classList.toggle("light");

        if (body.classList.contains("dark")) {
            btn.textContent = "☀️ Light Mode";
        } else {
            btn.textContent = "🌙 Dark Mode";
        }
    }
</script>

</body>
</html>
